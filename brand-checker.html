<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruff Cuts — Brand Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #111;
      background: #f9fafb;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #6b7280; margin-top: 0.25rem; font-size: 0.95rem; }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 0.875rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      background: #fff;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: #111; }

    .input-row { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; }
    button {
      padding: 0.6rem 1.4rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #333; }
    .hint { font-size: 0.8rem; color: #9ca3af; }

    #output { margin-top: 2rem; display: none; }

    .score {
      display: flex;
      gap: 1.5rem;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 1.25rem;
    }
    .score-item { display: flex; align-items: center; gap: 0.5rem; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-block { background: #dc2626; }
    .dot-soft  { background: #d97706; }
    .dot-brand { background: #16a34a; }
    .score-num { font-size: 1.05rem; font-weight: 700; }
    .score-label { font-size: 0.8rem; color: #6b7280; }

    .section { margin-bottom: 1.25rem; }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 0.6rem;
    }

    .rendered {
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      line-height: 1.8;
      word-break: break-word;
    }
    mark {
      border-radius: 3px;
      padding: 1px 3px;
      cursor: help;
      text-decoration: none;
    }
    mark.blocker { background: #fee2e2; color: #991b1b; }
    mark.soft    { background: #fef3c7; color: #92400e; }
    mark.brand   { background: #dcfce7; color: #14532d; }

    .issues { display: flex; flex-direction: column; gap: 0.5rem; }
    .issue {
      padding: 0.7rem 1rem;
      border-radius: 6px;
      border-left: 3px solid;
      font-size: 0.9rem;
    }
    .issue.blocker { background: #fef2f2; border-color: #dc2626; }
    .issue.soft    { background: #fffbeb; border-color: #d97706; }
    .issue.brand   { background: #f0fdf4; border-color: #16a34a; }
    .issue-header { display: flex; align-items: baseline; gap: 0.5rem; }
    .issue-id     { font-size: 0.7rem; font-weight: 700; opacity: 0.6; flex-shrink: 0; }
    .issue-text   { font-weight: 600; }
    .issue-why    { color: #6b7280; font-size: 0.85rem; margin-top: 0.15rem; }

    .clean {
      padding: 1rem 1.25rem;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      color: #14532d;
      font-weight: 600;
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }
    .legend span { display: flex; align-items: center; gap: 0.35rem; }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.8rem;
      color: #9ca3af;
    }
    footer a { color: #9ca3af; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Ruff Cuts — Brand Checker</h1>
    <p>Paste any copy — caption, email, text, review reply. Instant feedback.</p>
  </header>

  <textarea id="input" placeholder="Paste your copy here..."></textarea>
  <div class="input-row">
    <button onclick="check()">Check copy</button>
    <span class="hint">or Cmd+Enter</span>
  </div>

  <div id="output">

    <div class="score" id="score"></div>

    <div class="section">
      <div class="legend">
        <span><mark class="blocker" style="font-size:0.75rem">NV</mark> Blocker — rewrite</span>
        <span><mark class="soft" style="font-size:0.75rem">SF</mark> Soft flag — review</span>
        <span><mark class="brand" style="font-size:0.75rem">✓</mark> On-brand</span>
      </div>
      <div class="rendered" id="rendered"></div>
    </div>

    <div class="section" id="issues-section">
      <div class="section-title" id="issues-title"></div>
      <div class="issues" id="issues"></div>
    </div>

  </div>

  <footer>
    Ruff Cuts Brand Voice Guide v1.4 &middot;
    <a href="README.md">Full guide</a> &middot;
    <a href="quick-reference.md">Quick reference</a>
  </footer>

</div>
<script>
  const RULES = {
    blockers: [
      {
        id: 'NV-01', label: 'Fur baby language',
        patterns: [/fur baby/gi, /furry family member/gi, /four-legged friend/gi],
        why: 'Treats the dog as a prop. Puts us in the squeaky toy aisle.'
      },
      {
        id: 'NV-02', label: 'Baby talk',
        patterns: [/\bdoggo\b/gi, /\bpupper\b/gi, /\bfloof\b/gi, /\bheckin\b/gi, /precious angel/gi],
        why: 'Adult clients are the audience. Sounds like every other groomer in town.'
      },
      {
        id: 'NV-03', label: 'Paw puns',
        patterns: [/\bpawsome\b/gi, /\bpawsitively\b/gi, /\bpawfect\b/gi, /\bfurbulous\b/gi, /\bwagtastic\b/gi],
        why: 'Puns land us in the same register as bath bomb packaging.'
      },
      {
        id: 'NV-04', label: 'Aspirational hedging',
        patterns: [/we'?re passionate about/gi, /we'?re committed to/gi, /we strive to/gi, /we'?re dedicated to/gi],
        why: 'Commit, or don\'t. Hedging erodes trust before you\'ve done anything wrong.'
      },
      {
        id: 'NV-05', label: 'Hype without evidence',
        patterns: [/our amazing team/gi, /our incredible team/gi, /absolutely fabulous/gi],
        why: 'Adjectives pretending to be evidence. State what happened instead.'
      },
      {
        id: 'NV-06', label: 'Corporate call center',
        patterns: [/per our policy/gi, /at this time/gi, /it has come to our attention/gi],
        why: 'We are not a call center. Small business, real voice.'
      },
      {
        id: 'NV-07', label: 'Vague commitment',
        patterns: [/we aim to respond/gi, /we strive to provide/gi, /we endeavor to/gi, /we hope to/gi],
        why: 'If you can\'t name the specific thing, don\'t claim it.'
      },
      {
        id: 'NV-08', label: 'Unprovable superlatives',
        patterns: [/best-in-class/gi, /industry-leading/gi, /cutting-edge/gi, /world-class/gi],
        why: 'Unprovable. Remove or add verifiable evidence.'
      }
    ],
    softFlags: [
      {
        id: 'SF-01', label: 'AI tells',
        patterns: [/\bdelve\b/gi, /\btapestry\b/gi, /\blandscape\b/gi, /navigate the/gi, /it is worth noting/gi, /\bunleash\b/gi, /\bgame.changer\b/gi],
        why: 'AI tells. Breaks the implicit promise that a human wrote this.'
      },
      {
        id: 'SF-02', label: 'Hype adjectives',
        patterns: [/\bamazing\b/gi, /\btransformative\b/gi, /above and beyond/gi, /\bincredible\b/gi],
        why: 'Hype adjectives performing as evidence. State what happened instead.'
      },
      {
        id: 'SF-03', label: 'Em-dash pairs',
        patterns: [/—[^—\n]{1,60}—/g],
        why: 'Structural AI tell. Use the em-dash sparingly — never in pairs.'
      },
      {
        id: 'SF-04', label: 'Filler openers',
        patterns: [/just wanted to let you know/gi, /i hope this (email|message) finds you well/gi, /hope you'?re? (doing )?well/gi],
        why: 'Filler openers. Lead with the relevant fact instead.'
      },
      {
        id: 'SF-05', label: 'Overused enthusiasm',
        patterns: [/excited to announce/gi, /thrilled to share/gi],
        why: 'Reserve for genuinely exciting news. Not every update.'
      }
    ],
    onBrand: [
      'done', 'noticed', 'spotted', 'settled in', "we'll sort it",
      'handled', "we're out front", 'side-eye'
    ]
  };

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function findMatches(text) {
    const matches = [];

    for (const rule of RULES.blockers) {
      for (const pat of rule.patterns) {
        const re = new RegExp(pat.source, pat.flags);
        let m;
        while ((m = re.exec(text)) !== null) {
          matches.push({ start: m.index, end: m.index + m[0].length, type: 'blocker', id: rule.id, matched: m[0], why: rule.why, label: rule.label });
        }
      }
    }

    for (const rule of RULES.softFlags) {
      for (const pat of rule.patterns) {
        const re = new RegExp(pat.source, pat.flags);
        let m;
        while ((m = re.exec(text)) !== null) {
          matches.push({ start: m.index, end: m.index + m[0].length, type: 'soft', id: rule.id, matched: m[0], why: rule.why, label: rule.label });
        }
      }
    }

    for (const word of RULES.onBrand) {
      const re = new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      let m;
      while ((m = re.exec(text)) !== null) {
        matches.push({ start: m.index, end: m.index + m[0].length, type: 'brand', id: '✓', matched: m[0], why: 'On-brand word.', label: word });
      }
    }

    const priority = { blocker: 0, soft: 1, brand: 2 };
    matches.sort((a, b) => a.start - b.start || priority[a.type] - priority[b.type]);

    const filtered = [];
    let lastEnd = -1;
    for (const m of matches) {
      if (m.start >= lastEnd) {
        filtered.push(m);
        lastEnd = m.end;
      }
    }
    return filtered;
  }

  function buildHTML(text, matches) {
    let html = '';
    let pos = 0;
    for (const m of matches) {
      html += escapeHTML(text.slice(pos, m.start));
      const tip = escapeHTML(m.id + ': ' + m.why);
      html += `<mark class="${m.type}" title="${tip}">${escapeHTML(text.slice(m.start, m.end))}</mark>`;
      pos = m.end;
    }
    html += escapeHTML(text.slice(pos));
    return html.replace(/\n/g, '<br>');
  }

  function check() {
    const text = document.getElementById('input').value.trim();
    if (!text) return;

    const matches   = findMatches(text);
    const blockers  = matches.filter(m => m.type === 'blocker');
    const softFlags = matches.filter(m => m.type === 'soft');
    const branded   = matches.filter(m => m.type === 'brand');

    document.getElementById('score').innerHTML = `
      <div class="score-item">
        <div class="dot dot-block"></div>
        <span class="score-num">${blockers.length}</span>
        <span class="score-label">blocker${blockers.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="score-item">
        <div class="dot dot-soft"></div>
        <span class="score-num">${softFlags.length}</span>
        <span class="score-label">soft flag${softFlags.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="score-item">
        <div class="dot dot-brand"></div>
        <span class="score-num">${branded.length}</span>
        <span class="score-label">on-brand</span>
      </div>
    `;

    document.getElementById('rendered').innerHTML = buildHTML(text, matches);

    const issuesEl = document.getElementById('issues');
    const titleEl  = document.getElementById('issues-title');
    const allIssues = [...blockers, ...softFlags, ...branded];

    if (allIssues.length === 0) {
      titleEl.textContent = '';
      issuesEl.innerHTML = '<div class="clean">No issues found. Looks on-brand.</div>';
    } else {
      titleEl.textContent = 'Details';
      const seen = new Set();
      const unique = allIssues.filter(m => {
        const key = m.id + ':' + m.matched.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      issuesEl.innerHTML = unique.map(m => `
        <div class="issue ${m.type}">
          <div class="issue-header">
            <span class="issue-id">${escapeHTML(m.id)}</span>
            <span class="issue-text">"${escapeHTML(m.matched)}"</span>
          </div>
          <div class="issue-why">${escapeHTML(m.why)}</div>
        </div>
      `).join('');
    }

    document.getElementById('output').style.display = 'block';
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') check();
  });
</script>
</body>
</html>
